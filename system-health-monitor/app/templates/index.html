<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Health Monitor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>System Health Monitor</h1>
            <div class="status">
                <span class="dot"></span>
                <span id="timestamp">--:--:--</span>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>CPU Usage</h2>
                <div class="gauge">
                    <div class="gauge-bar" id="cpu-bar"></div>
                </div>
                <div class="value" id="cpu-value">--%</div>
                <div class="sub" id="cpu-cores">-- cores</div>
            </div>

            <div class="card">
                <h2>RAM Usage</h2>
                <div class="gauge">
                    <div class="gauge-bar" id="ram-bar"></div>
                </div>
                <div class="value" id="ram-value">--%</div>
                <div class="sub" id="ram-detail">-- / -- GB</div>
            </div>

            <div class="card">
                <h2>Disk Usage</h2>
                <div class="gauge">
                    <div class="gauge-bar" id="disk-bar"></div>
                </div>
                <div class="value" id="disk-value">--%</div>
                <div class="sub" id="disk-detail">-- / -- GB</div>
            </div>

            <div class="card">
                <h2>Network</h2>
                <div class="net-stat">
                    <span>Sent</span>
                    <span id="net-sent">-- MB</span>
                </div>
                <div class="net-stat">
                    <span>Received</span>
                    <span id="net-recv">-- MB</span>
                </div>
            </div>
        </div>

        <div class="card processes">
            <h2>Top Processes</h2>
            <table>
                <thead>
                    <tr>
                        <th>PID</th>
                        <th>Name</th>
                        <th>CPU %</th>
                        <th>RAM %</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="process-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        function getColor(percent) {
            if (percent < 50) return "#3FD9C7";
            if (percent < 80) return "#f0a500";
            return "#e74c3c";
        }

        function updateBar(barId, percent) {
            const bar = document.getElementById(barId);
            bar.style.width = percent + "%";
            bar.style.background = getColor(percent);
        }

        async function fetchStats() {
            try {
                const res = await fetch("/api/stats");
                const d = await res.json();

                document.getElementById("timestamp").textContent = d.timestamp;

                document.getElementById("cpu-value").textContent = d.cpu.percent + "%";
                document.getElementById("cpu-cores").textContent = d.cpu.cores + " cores";
                updateBar("cpu-bar", d.cpu.percent);

                document.getElementById("ram-value").textContent = d.ram.percent + "%";
                document.getElementById("ram-detail").textContent = d.ram.used_gb + " / " + d.ram.total_gb + " GB";
                updateBar("ram-bar", d.ram.percent);

                document.getElementById("disk-value").textContent = d.disk.percent + "%";
                document.getElementById("disk-detail").textContent = d.disk.used_gb + " / " + d.disk.total_gb + " GB";
                updateBar("disk-bar", d.disk.percent);

                document.getElementById("net-sent").textContent = d.network.bytes_sent_mb + " MB";
                document.getElementById("net-recv").textContent = d.network.bytes_recv_mb + " MB";

                const tbody = document.getElementById("process-table");
                tbody.innerHTML = "";
                d.processes.forEach(p => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${p.pid}</td>
                        <td>${p.name}</td>
                        <td>${(p.cpu_percent || 0).toFixed(1)}%</td>
                        <td>${(p.memory_percent || 0).toFixed(1)}%</td>
                        <td><span class="badge ${p.status}">${p.status}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("Failed to fetch stats", e);
            }
        }

        fetchStats();
        setInterval(fetchStats, 3000);
    </script>
</body>
</html>
